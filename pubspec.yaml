name: heicflow
description: "HEICFlow — HEIC to JPG/PNG/PDF converter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  file_picker: ^10.3.2
  heif_converter: ^1.0.1
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^11.1.0
  path_provider: ^2.1.5
  archive: ^4.0.7
  logger: ^2.6.2
  dynamic_color: ^1.8.1
  shared_preferences: ^2.5.3
  image: ^4.5.4
  path: ^1.9.1
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
